openapi: 3.0.1
info:
  title: CDISC Library API
  description: Public API for CDISC Library
  version: '1.0'
servers:
  - url: https://api.library.cdisc.org/api
paths: {}
components:
  schemas:
    link:
      properties:
        href:
          type: string
          description: href
          format: uri
        title:
          type: string
          description: title
        type:
          type: string
          description: type
      description: Resource Reference
    rootItemRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Root Item Reference
    priorVersion:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Prior Version Reference
    action:
      type: object
      properties:
        name:
          type: string
          description: Name of the action to take
        params:
          type: object
          description: Parameters needed by the action
      description: Conformance Rule Action
    condition:
      type: object
      properties:
        name:
          type: string
          description: Name of the condition
        params:
          type: object
          description: Parameters needed by the condition
        operator:
          type: string
          description: The operator to perform on the condition method
        value:
          description: Any necessary comparison value
        any:
          type: array
          items:
            $ref: '#/components/schemas/condition'
          description: A list of conditions that will return true if any of the conditions in the list are true
        all:
          type: array
          items:
            $ref: '#/components/schemas/condition'
          description: A list of conditions that will return try if all of the conditions in the list are true
      description: Conformance Rule condition
    standard:
      type: object
      properties:
        Name:
          type: string
          description: Standard type
        Version:
          type: string
          description: standard version
          example: 3-4
      description: Name and version of a standard
    rule_reference:
      type: object
      properties:
        Id:
          type: string
          description: Published rule id
        Origin:
          type: string
          description: Rule source
        Version:
          type: string
          description: Rule version
      description: Reference to published rule definition
    authority:
      type: object
      properties:
        Organization:
          type: string
          description: Publisher organization
      description: Rule publisher
    rule_classes:
      type: object
      properties:
        Include:
          type: array
          items:
            type: string
          description: A list of classes that a rule explicitly applies to. Use 'All' when a rule applies to all classes
        Exclude:
          type: array
          items:
            type: string
          description: A list of classes that a rule explicitly DOES NOT apply to.
      description: Classes a rule applies to
    rule_domains:
      type: object
      properties:
        Include:
          type: array
          items:
            type: string
          description: A list of domains that a rule explicitly applies to. Use 'All' when a rule applies to all domains
        Exclude:
          type: array
          items:
            type: string
          description: A list of domains that a rule explicitly DOES NOT apply to.
      description: Domains/Datasets a rule applies to
    rule:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            package:
              $ref: '#/components/schemas/link'
            priorVersion:
              $ref: '#/components/schemas/link'
            standards:
              type: array
              items:
                $ref: '#/components/schemas/link'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/action'
        core_id:
          type: string
          description: Identifier for core related activities
        description:
          type: string
          description: Rule description
        id:
          type: string
          description: Unique id for referencing a rule
        rule_type:
          type: string
          description: Type of rule
        sensitivity:
          type: string
          description: Rule sensitivity
        severity:
          type: string
          description: Describes how severe a rule violatio is
        standards:
          type: array
          items:
            $ref: '#/components/schemas/standard'
          description: All standards the rule applies to
        reference:
          $ref: '#/components/schemas/rule_reference'
        authority:
          $ref: '#/components/schemas/authority'
        classes:
          $ref: '#/components/schemas/rule_classes'
        domains:
          $ref: '#/components/schemas/rule_domains'
        conditions:
          $ref: '#/components/schemas/condition'
      description: Conformance Rule
    rule_package:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            priorVersion:
              $ref: '#/components/schemas/link'
            standards:
              type: array
              items:
                $ref: '#/components/schemas/link'
        rules:
          type: object
          description: Mapping of rule id to rule definition
      description: Rule release package
    diffResult:
      type: object
      properties:
        diff:
          type: array
          items:
            type: object
            properties:
              body:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: object
                      properties:
                        format:
                          type: object
                        text:
                          type: string
              head:
                type: array
                items:
                  type: string
              title:
                type: string
      description: Keyediffer Result
    searchResult:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            searchResults:
              type: array
              items:
                $ref: '#/components/schemas/link'
              description: Search Results
      description: Search Result
    searchScopeList:
      type: object
      properties:
        scopes:
          type: array
          items:
            type: string
          description: Search Scopes
      description: Search Scope List
    suggestResult:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            searchResults:
              type: array
              items:
                $ref: '#/components/schemas/link'
              description: Suggestion Results
      description: Suggestion Result
    rootItem:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            versions:
              type: array
              items:
                $ref: '#/components/schemas/link'
              description: Item Versions
      description: Root Item
    productAttributes:
      properties:
        name:
          type: string
          description: Product Name
        label:
          type: string
          description: Product Label
        description:
          type: string
          description: Product Description
        source:
          type: string
          description: Product Source
        effectiveDate:
          type: string
          description: Effective Date
          format: date
        registrationStatus:
          type: string
          description: Registration Status
        version:
          type: string
          description: Version
      description: CDISC Library Product Attributes
    productRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: CDISC Library Product Reference
    corrigenda:
      type: array
      items:
        type: object
        properties:
          impactedItem:
            type: object
            allOf:
              - $ref: '#/components/schemas/link'
            description: Impacted Item
          impactedProperty:
            type: string
            description: Impacted Property
          publishedValue:
            type: string
            description: Published Value
          correctedValue:
            type: string
            description: Corrected Value
          publishedResource:
            type: object
            allOf:
              - $ref: '#/components/schemas/link'
            description: Published Resource Reference
          correctedResource:
            type: object
            allOf:
              - $ref: '#/components/schemas/link'
            description: Corrected Resource Reference
      description: List of Corrigenda
    parentPackage:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Parent Package Reference
    parentCodelist:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Parent Codelist Reference
    termRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Codelist Term Reference
    codelistRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Codelist Reference
    packageRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: CT Package Reference
    term:
      type: object
      properties:
        conceptId:
          pattern: C\d+$
          type: string
          description: NCI Thesaurus Concept Identifier
        submissionValue:
          type: string
          description: Term Submission Value
        definition:
          type: string
          description: Term Definition
        preferredTerm:
          type: string
          description: Preferred Term
        synonyms:
          type: array
          items:
            type: string
          description: Term Synonyms
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            parentPackage:
              $ref: '#/components/schemas/parentPackage'
            parentCodelist:
              $ref: '#/components/schemas/parentCodelist'
            rootItem:
              $ref: '#/components/schemas/rootItemRef'
            priorVersion:
              $ref: '#/components/schemas/priorVersion'
      description: Codelist Term
    packageTerm:
      type: object
      properties:
        conceptId:
          pattern: C\d+$
          type: string
          description: NCI Thesaurus Concept Identifier
        submissionValue:
          type: string
          description: Term Submission Value
        definition:
          type: string
          description: Term Definition
        preferredTerm:
          type: string
          description: Preferred Term
        synonyms:
          type: array
          items:
            type: string
          description: Term Synonyms
      description: Codelist Term without links
    codelistAttributes:
      properties:
        conceptId:
          pattern: C\d+$
          type: string
          description: NCI Thesaurus Concept Identifier
        extensible:
          type: boolean
          description: Extensible
        name:
          type: string
          description: Codelist Name
        submissionValue:
          type: string
          description: Codelist Submission Value
        definition:
          type: string
          description: Codelist Definition
        preferredTerm:
          type: string
          description: Codelist Preferred Term
        synonyms:
          type: array
          items:
            type: string
          description: Codelist Synonyms
      description: Codelist Attributes
    codelist:
      type: object
      allOf:
        - $ref: '#/components/schemas/codelistAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentPackage:
                  $ref: '#/components/schemas/parentPackage'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
            terms:
              type: array
              items:
                $ref: '#/components/schemas/packageTerm'
              description: Codelist Terms
      description: Codelist with Terms
    packageCodelist:
      type: object
      allOf:
        - $ref: '#/components/schemas/codelistAttributes'
        - properties:
            terms:
              type: array
              items:
                $ref: '#/components/schemas/packageTerm'
              description: Codelist Terms
      description: Codelist with Terms, but without links
    codelistDigest:
      type: object
      allOf:
        - $ref: '#/components/schemas/codelistAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentPackage:
                  $ref: '#/components/schemas/parentPackage'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                terms:
                  type: array
                  items:
                    $ref: '#/components/schemas/termRef'
                  description: Codelist Term References
      description: Codelist with Term References
    package:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
            codelists:
              type: array
              items:
                $ref: '#/components/schemas/packageCodelist'
              description: Codelists
      description: CT Package with Codelists
    packageDigest:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                codelists:
                  type: array
                  items:
                    $ref: '#/components/schemas/codelistRef'
                  description: Codelist References
      description: CT Package with Codelist References
    packageList:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            packages:
              type: array
              items:
                $ref: '#/components/schemas/packageRef'
              description: Package References
      description: CT Package List
    valuelistRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Value List Reference
    modelRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Model Reference
    classRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Class Reference
    classAttributes:
      properties:
        ordinal:
          type: integer
          description: Ordinal
        name:
          type: string
          description: Class Name
        label:
          type: string
          description: Class Label
        description:
          type: string
          description: Class Description
      description: Class Attributes
    fieldRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Field Reference
    domainRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Domain Reference
    scenarioRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Scenario Reference
    cdashFieldAttributes:
      type: object
      properties:
        ordinal:
          type: integer
          description: Ordinal
        name:
          type: string
          description: Field Name
        label:
          type: string
          description: Field Label
        definition:
          type: string
          description: Field Definition
        questionText:
          type: string
          description: Field Question Text
        prompt:
          type: string
          description: Field Prompt
        completionInstructions:
          type: string
          description: Field Completion Instructions
        implementationNotes:
          type: string
          description: Field Implementation Notes
        simpleDatatype:
          type: string
          description: Field Simple Datatype
        mappingInstructions:
          type: string
          description: Field Mapping Instructions
      description: CDASH Field Attributes
    cdashModelFieldAttributes:
      type: object
      properties:
        ordinal:
          type: integer
          description: Ordinal
        name:
          type: string
          description: Field Name
        label:
          type: string
          description: Field Label
        definition:
          type: string
          description: Field Definition
        domainSpecific:
          type: boolean
          description: Domain-Specific
        questionText:
          type: string
          description: Field Question Text
        prompt:
          type: string
          description: Field Prompt
        implementationNotes:
          type: string
          description: Field Implementation Notes
        simpleDatatype:
          type: string
          description: Field Simple Datatype
        mappingInstructions:
          type: string
          description: Field Mapping Instructions
      description: CDASH Field Attributes
    cdashModelField:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashModelFieldAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                codelist:
                  $ref: '#/components/schemas/codelistRef'
                valuelist:
                  $ref: '#/components/schemas/valuelistRef'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                sdtmClassMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTM Mapping Target Variables
                sdtmDatasetMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTM Mapping Target Variables
      description: CDASH Model Field
    cdashClass:
      type: object
      allOf:
        - $ref: '#/components/schemas/classAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
            cdashModelFields:
              type: array
              items:
                $ref: '#/components/schemas/cdashModelField'
              description: CDASH Model Fields
      description: CDASH Class
    cdashProduct:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
            classes:
              type: array
              items:
                $ref: '#/components/schemas/cdashClass'
              description: Classes
            domains:
              type: array
              items:
                $ref: '#/components/schemas/cdashDomain'
              description: Domains
      description: CDASH Product
    cdashDomain:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashDomainAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
            fields:
              type: array
              items:
                $ref: '#/components/schemas/cdashField'
              description: Domain Fields
      description: CDASH Domain
    cdashField:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashFieldAttributes'
        - properties:
            core:
              type: string
              description: Core Classifier
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                codelist:
                  $ref: '#/components/schemas/codelistRef'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentDomain:
                  $ref: '#/components/schemas/domainRef'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                sdtmDatasetMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTM Mapping Target Variables
                sdtmigDatasetMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTMIG Mapping Target Variables
      description: CDASH Field
    cdashDomainAttributes:
      type: object
      properties:
        ordinal:
          type: integer
          description: Ordinal
        name:
          type: string
          description: Domain Name
        label:
          type: string
          description: Domain Label
        status:
          type: string
          description: Domain Status
      description: CDASHIG Domain Attributes
    classList:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                classes:
                  type: array
                  items:
                    $ref: '#/components/schemas/classRef'
                  description: Class References
      description: Class List
    cdashClassList:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                classes:
                  type: array
                  items:
                    $ref: '#/components/schemas/classRef'
                  description: Class References
      description: Class List
    cdashDomainList:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
            domains:
              type: array
              items:
                $ref: '#/components/schemas/domainRef'
              description: Domain Reference List
      description: CDASH Domain List
    cdashClassDomainList:
      type: object
      allOf:
        - $ref: '#/components/schemas/classAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
            domains:
              type: array
              items:
                $ref: '#/components/schemas/domainRef'
              description: Domain Reference List
      description: Domain Class List
    cdashFieldList:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
            fields:
              type: array
              items:
                $ref: '#/components/schemas/fieldRef'
              description: Field Reference List
      description: CDASH Field List
    cdashigField:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashFieldAttributes'
        - properties:
            core:
              type: string
              description: Core Classifier
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                codelist:
                  $ref: '#/components/schemas/codelistRef'
                valuelist:
                  $ref: '#/components/schemas/valuelistRef'
                modelField:
                  $ref: '#/components/schemas/fieldRef'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentDomain:
                  $ref: '#/components/schemas/domainRef'
                parentScenario:
                  $ref: '#/components/schemas/scenarioRef'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                sdtmClassMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTM Mapping Target Variables
                sdtmigDatasetMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTMIG Mapping Target Variables
      description: CDASHIG Field
    cdashigScenarioField:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashFieldAttributes'
        - properties:
            core:
              type: string
              description: Core Classifier
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                codelist:
                  $ref: '#/components/schemas/codelistRef'
                valuelist:
                  $ref: '#/components/schemas/valuelistRef'
                modelField:
                  $ref: '#/components/schemas/fieldRef'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentDomain:
                  $ref: '#/components/schemas/domainRef'
                parentScenario:
                  $ref: '#/components/schemas/scenarioRef'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                sdtmigDatasetMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTMIG Mapping Target Variables
      description: CDASHIG Field
    cdashigDomainAttributes:
      type: object
      properties:
        ordinal:
          type: integer
          description: Ordinal
        name:
          type: string
          description: Domain Name
        label:
          type: string
          description: Domain Label
        status:
          type: string
          description: Domain Status
      description: CDASHIG Domain Attributes
    cdashigDomain:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashigDomainAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                scenarios:
                  type: array
                  items:
                    $ref: '#/components/schemas/scenarioRef'
                  description: Domain Scenarios
            fields:
              type: array
              items:
                $ref: '#/components/schemas/cdashigField'
              description: Domain Fields
      description: CDASHIG Domain
    cdashigDomainDigest:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashigDomainAttributes'
        - properties:
            _links:
              type: object
