openapi: 3.0.1
info:
  title: CDISC Library API
  description: Public API for CDISC Library
  version: '1.0'
servers:
  - url: https://api.library.cdisc.org/api
paths: {}
components:
  schemas:
    link:
      properties:
        href:
          type: string
          description: href
          format: uri
          title: Href
        title:
          type: string
          description: title
          title: Title
        type:
          type: string
          description: type
          title: Type
      description: Resource Reference
    rootItemRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Root Item Reference
    priorVersion:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Prior Version Reference
    action:
      type: object
      properties:
        name:
          type: string
          description: Name of the action to take
          title: Name
        params:
          type: object
          description: Parameters needed by the action
          title: Params
      description: Conformance Rule Action
    condition:
      type: object
      properties:
        name:
          type: string
          description: Name of the condition
          title: Name
        params:
          type: object
          description: Parameters needed by the condition
          title: Params
        operator:
          type: string
          description: The operator to perform on the condition method
          title: Operator
        value:
          description: Any necessary comparison value
          title: Value
        any:
          type: array
          items:
            $ref: '#/components/schemas/condition'
          description: A list of conditions that will return true if any of the conditions in the list are true
          title: Any
        all:
          type: array
          items:
            $ref: '#/components/schemas/condition'
          description: A list of conditions that will return try if all of the conditions in the list are true
          title: All
      description: Conformance Rule condition
    standard:
      type: object
      properties:
        Name:
          type: string
          description: Standard type
          title: Name
        Version:
          type: string
          description: standard version
          example: 3-4
          title: Version
      description: Name and version of a standard
    rule_reference:
      type: object
      properties:
        Id:
          type: string
          description: Published rule id
          title: Id
        Origin:
          type: string
          description: Rule source
          title: Origin
        Version:
          type: string
          description: Rule version
          title: Version
      description: Reference to published rule definition
    authority:
      type: object
      properties:
        Organization:
          type: string
          description: Publisher organization
          title: Organization
      description: Rule publisher
    rule_classes:
      type: object
      properties:
        Include:
          type: array
          items:
            type: string
          description: A list of classes that a rule explicitly applies to. Use 'All' when a rule applies to all classes
          title: Include
        Exclude:
          type: array
          items:
            type: string
          description: A list of classes that a rule explicitly DOES NOT apply to.
          title: Exclude
      description: Classes a rule applies to
    rule_domains:
      type: object
      properties:
        Include:
          type: array
          items:
            type: string
          description: A list of domains that a rule explicitly applies to. Use 'All' when a rule applies to all domains
          title: Include
        Exclude:
          type: array
          items:
            type: string
          description: A list of domains that a rule explicitly DOES NOT apply to.
          title: Exclude
      description: Domains/Datasets a rule applies to
    rule:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            package:
              $ref: '#/components/schemas/link'
            priorVersion:
              $ref: '#/components/schemas/link'
            standards:
              type: array
              items:
                $ref: '#/components/schemas/link'
              title: Standards
          title: Title for _links
          description: Description for _links
        actions:
          type: array
          items:
            $ref: '#/components/schemas/action'
          title: Actions
        core_id:
          type: string
          description: Identifier for core related activities
          title: Core Id
        description:
          type: string
          description: Rule description
          title: Description
        id:
          type: string
          description: Unique id for referencing a rule
          title: Id
        rule_type:
          type: string
          description: Type of rule
          title: Rule Type
        sensitivity:
          type: string
          description: Rule sensitivity
          title: Sensitivity
        severity:
          type: string
          description: Describes how severe a rule violatio is
          title: Severity
        standards:
          type: array
          items:
            $ref: '#/components/schemas/standard'
          description: All standards the rule applies to
          title: Standards
        reference:
          $ref: '#/components/schemas/rule_reference'
        authority:
          $ref: '#/components/schemas/authority'
        classes:
          $ref: '#/components/schemas/rule_classes'
        domains:
          $ref: '#/components/schemas/rule_domains'
        conditions:
          $ref: '#/components/schemas/condition'
      description: Conformance Rule
    rule_package:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            priorVersion:
              $ref: '#/components/schemas/link'
            standards:
              type: array
              items:
                $ref: '#/components/schemas/link'
              title: Standards
          title: Title for _links
          description: Description for _links
        rules:
          type: object
          description: Mapping of rule id to rule definition
          title: Rules
      description: Rule release package
    diffResult:
      type: object
      properties:
        diff:
          type: array
          items:
            type: object
            properties:
              body:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: object
                      properties:
                        format:
                          type: object
                        text:
                          type: string
                title: Body
              head:
                type: array
                items:
                  type: string
                title: Head
              title:
                type: string
                title: Title
          title: Diff
      description: Keyediffer Result
    searchResult:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            searchResults:
              type: array
              items:
                $ref: '#/components/schemas/link'
              description: Search Results
              title: Search Results
          title: Title for _links
          description: Description for _links
      description: Search Result
    searchScopeList:
      type: object
      properties:
        scopes:
          type: array
          items:
            type: string
          description: Search Scopes
          title: Title for scopes
      description: Search Scope List
    suggestResult:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            searchResults:
              type: array
              items:
                $ref: '#/components/schemas/link'
              description: Suggestion Results
              title: Search Results
          title: Title for _links
          description: Description for _links
      description: Suggestion Result
    rootItem:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            versions:
              type: array
              items:
                $ref: '#/components/schemas/link'
              description: Item Versions
              title: Versions
          title: Title for _links
          description: Description for _links
      description: Root Item
    productAttributes:
      properties:
        name:
          type: string
          description: Product Name
          title: Name
        label:
          type: string
          description: Product Label
          title: Label
        description:
          type: string
          description: Product Description
          title: Description
        source:
          type: string
          description: Product Source
          title: Source
        effectiveDate:
          type: string
          description: Effective Date
          format: date
          title: Effective Date
        registrationStatus:
          type: string
          description: Registration Status
          title: Registration Status
        version:
          type: string
          description: Version
          title: Version
      description: CDISC Library Product Attributes
    productRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: CDISC Library Product Reference
    corrigenda:
      type: array
      items:
        type: object
        properties:
          impactedItem:
            type: object
            allOf:
              - $ref: '#/components/schemas/link'
            description: Impacted Item
            title: Impacted Item
          impactedProperty:
            type: string
            description: Impacted Property
            title: Impacted Property
          publishedValue:
            type: string
            description: Published Value
            title: Published Value
          correctedValue:
            type: string
            description: Corrected Value
            title: Corrected Value
          publishedResource:
            type: object
            allOf:
              - $ref: '#/components/schemas/link'
            description: Published Resource Reference
            title: Published Resource
          correctedResource:
            type: object
            allOf:
              - $ref: '#/components/schemas/link'
            description: Corrected Resource Reference
            title: Corrected Resource
      description: List of Corrigenda
    parentPackage:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Parent Package Reference
    parentCodelist:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Parent Codelist Reference
    termRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Codelist Term Reference
    codelistRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Codelist Reference
    packageRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: CT Package Reference
    term:
      type: object
      properties:
        conceptId:
          pattern: C\d+$
          type: string
          description: NCI Thesaurus Concept Identifier
          title: Concept Id
        submissionValue:
          type: string
          description: Term Submission Value
          title: Submission Value
        definition:
          type: string
          description: Term Definition
          title: Definition
        preferredTerm:
          type: string
          description: Preferred Term
          title: Preferred Term
        synonyms:
          type: array
          items:
            type: string
          description: Term Synonyms
          title: Synonyms
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            parentPackage:
              $ref: '#/components/schemas/parentPackage'
            parentCodelist:
              $ref: '#/components/schemas/parentCodelist'
            rootItem:
              $ref: '#/components/schemas/rootItemRef'
            priorVersion:
              $ref: '#/components/schemas/priorVersion'
          title: Title for _links
          description: Description for _links
      description: Codelist Term
    packageTerm:
      type: object
      properties:
        conceptId:
          pattern: C\d+$
          type: string
          description: NCI Thesaurus Concept Identifier
          title: Concept Id
        submissionValue:
          type: string
          description: Term Submission Value
          title: Submission Value
        definition:
          type: string
          description: Term Definition
          title: Definition
        preferredTerm:
          type: string
          description: Preferred Term
          title: Preferred Term
        synonyms:
          type: array
          items:
            type: string
          description: Term Synonyms
          title: Synonyms
      description: Codelist Term without links
    codelistAttributes:
      properties:
        conceptId:
          pattern: C\d+$
          type: string
          description: NCI Thesaurus Concept Identifier
          title: Concept Id
        extensible:
          type: boolean
          description: Extensible
          title: Extensible
        name:
          type: string
          description: Codelist Name
          title: Name
        submissionValue:
          type: string
          description: Codelist Submission Value
          title: Submission Value
        definition:
          type: string
          description: Codelist Definition
          title: Definition
        preferredTerm:
          type: string
          description: Codelist Preferred Term
          title: Preferred Term
        synonyms:
          type: array
          items:
            type: string
          description: Codelist Synonyms
          title: Synonyms
      description: Codelist Attributes
    codelist:
      type: object
      allOf:
        - $ref: '#/components/schemas/codelistAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentPackage:
                  $ref: '#/components/schemas/parentPackage'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
              title: Title for _links
              description: Description for _links
            terms:
              type: array
              items:
                $ref: '#/components/schemas/packageTerm'
              description: Codelist Terms
              title: Terms
      description: Codelist with Terms
    packageCodelist:
      type: object
      allOf:
        - $ref: '#/components/schemas/codelistAttributes'
        - properties:
            terms:
              type: array
              items:
                $ref: '#/components/schemas/packageTerm'
              description: Codelist Terms
              title: Terms
      description: Codelist with Terms, but without links
    codelistDigest:
      type: object
      allOf:
        - $ref: '#/components/schemas/codelistAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentPackage:
                  $ref: '#/components/schemas/parentPackage'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                terms:
                  type: array
                  items:
                    $ref: '#/components/schemas/termRef'
                  description: Codelist Term References
                  title: Terms
              title: Title for _links
              description: Description for _links
      description: Codelist with Term References
    package:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
              title: Title for _links
              description: Description for _links
            codelists:
              type: array
              items:
                $ref: '#/components/schemas/packageCodelist'
              description: Codelists
              title: Codelists
      description: CT Package with Codelists
    packageDigest:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                codelists:
                  type: array
                  items:
                    $ref: '#/components/schemas/codelistRef'
                  description: Codelist References
                  title: Codelists
              title: Title for _links
              description: Description for _links
      description: CT Package with Codelist References
    packageList:
      type: object
      properties:
        _links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            packages:
              type: array
              items:
                $ref: '#/components/schemas/packageRef'
              description: Package References
              title: Packages
          title: Title for _links
          description: Description for _links
      description: CT Package List
    valuelistRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Value List Reference
    modelRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Model Reference
    classRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Class Reference
    classAttributes:
      properties:
        ordinal:
          type: integer
          description: Ordinal
          title: Ordinal
        name:
          type: string
          description: Class Name
          title: Name
        label:
          type: string
          description: Class Label
          title: Label
        description:
          type: string
          description: Class Description
          title: Description
      description: Class Attributes
    fieldRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Field Reference
    domainRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Domain Reference
    scenarioRef:
      type: object
      allOf:
        - $ref: '#/components/schemas/link'
      description: Scenario Reference
    cdashFieldAttributes:
      type: object
      properties:
        ordinal:
          type: integer
          description: Ordinal
          title: Ordinal
        name:
          type: string
          description: Field Name
          title: Name
        label:
          type: string
          description: Field Label
          title: Label
        definition:
          type: string
          description: Field Definition
          title: Definition
        questionText:
          type: string
          description: Field Question Text
          title: Question Text
        prompt:
          type: string
          description: Field Prompt
          title: Prompt
        completionInstructions:
          type: string
          description: Field Completion Instructions
          title: Completion Instructions
        implementationNotes:
          type: string
          description: Field Implementation Notes
          title: Implementation Notes
        simpleDatatype:
          type: string
          description: Field Simple Datatype
          title: Simple Datatype
        mappingInstructions:
          type: string
          description: Field Mapping Instructions
          title: Mapping Instructions
      description: CDASH Field Attributes
    cdashModelFieldAttributes:
      type: object
      properties:
        ordinal:
          type: integer
          description: Ordinal
          title: Ordinal
        name:
          type: string
          description: Field Name
          title: Name
        label:
          type: string
          description: Field Label
          title: Label
        definition:
          type: string
          description: Field Definition
          title: Definition
        domainSpecific:
          type: boolean
          description: Domain-Specific
          title: Domain Specific
        questionText:
          type: string
          description: Field Question Text
          title: Question Text
        prompt:
          type: string
          description: Field Prompt
          title: Prompt
        implementationNotes:
          type: string
          description: Field Implementation Notes
          title: Implementation Notes
        simpleDatatype:
          type: string
          description: Field Simple Datatype
          title: Simple Datatype
        mappingInstructions:
          type: string
          description: Field Mapping Instructions
          title: Mapping Instructions
      description: CDASH Field Attributes
    cdashModelField:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashModelFieldAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                codelist:
                  $ref: '#/components/schemas/codelistRef'
                valuelist:
                  $ref: '#/components/schemas/valuelistRef'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                sdtmClassMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTM Mapping Target Variables
                  title: Sdtm Class Mapping Targets
                sdtmDatasetMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTM Mapping Target Variables
                  title: Sdtm Dataset Mapping Targets
              title: Title for _links
              description: Description for _links
      description: CDASH Model Field
    cdashClass:
      type: object
      allOf:
        - $ref: '#/components/schemas/classAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
              title: Title for _links
              description: Description for _links
            cdashModelFields:
              type: array
              items:
                $ref: '#/components/schemas/cdashModelField'
              description: CDASH Model Fields
              title: Cdash Model Fields
      description: CDASH Class
    cdashProduct:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
              title: Title for _links
              description: Description for _links
            classes:
              type: array
              items:
                $ref: '#/components/schemas/cdashClass'
              description: Classes
              title: Classes
            domains:
              type: array
              items:
                $ref: '#/components/schemas/cdashDomain'
              description: Domains
              title: Domains
      description: CDASH Product
    cdashDomain:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashDomainAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
              title: Title for _links
              description: Description for _links
            fields:
              type: array
              items:
                $ref: '#/components/schemas/cdashField'
              description: Domain Fields
              title: Fields
      description: CDASH Domain
    cdashField:
      type: object
      allOf:
        - $ref: '#/components/schemas/cdashFieldAttributes'
        - properties:
            core:
              type: string
              description: Core Classifier
              title: Core
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                codelist:
                  $ref: '#/components/schemas/codelistRef'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentDomain:
                  $ref: '#/components/schemas/domainRef'
                rootItem:
                  $ref: '#/components/schemas/rootItemRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                sdtmDatasetMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTM Mapping Target Variables
                  title: Sdtm Dataset Mapping Targets
                sdtmigDatasetMappingTargets:
                  type: array
                  items:
                    $ref: '#/components/schemas/variableRef'
                  description: SDTMIG Mapping Target Variables
                  title: Sdtmig Dataset Mapping Targets
              title: Title for _links
              description: Description for _links
      description: CDASH Field
    cdashDomainAttributes:
      type: object
      properties:
        ordinal:
          type: integer
          description: Ordinal
          title: Ordinal
        name:
          type: string
          description: Domain Name
          title: Name
        label:
          type: string
          description: Domain Label
          title: Label
        status:
          type: string
          description: Domain Status
          title: Status
      description: CDASHIG Domain Attributes
    classList:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                classes:
                  type: array
                  items:
                    $ref: '#/components/schemas/classRef'
                  description: Class References
                  title: Classes
              title: Title for _links
              description: Description for _links
      description: Class List
    cdashClassList:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
                classes:
                  type: array
                  items:
                    $ref: '#/components/schemas/classRef'
                  description: Class References
                  title: Classes
              title: Title for _links
              description: Description for _links
      description: Class List
    cdashDomainList:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                priorVersion:
                  $ref: '#/components/schemas/priorVersion'
              title: Title for _links
              description: Description for _links
            domains:
              type: array
              items:
                $ref: '#/components/schemas/domainRef'
              description: Domain Reference List
              title: Domains
      description: CDASH Domain List
    cdashClassDomainList:
      type: object
      allOf:
        - $ref: '#/components/schemas/classAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
              title: Title for _links
              description: Description for _links
            domains:
              type: array
              items:
                $ref: '#/components/schemas/domainRef'
              description: Domain Reference List
              title: Domains
      description: Domain Class List
    cdashFieldList:
      type: object
      allOf:
        - $ref: '#/components/schemas/productAttributes'
        - properties:
            _links:
              type: object
              properties:
                self:
                  $ref: '#/components/schemas/link'
                parentProduct:
                  $ref: '#/components/schemas/productRef'
                parentClass:
                  $ref: '#/components/schemas/classRef'
