openapi: 3.0.1
info:
  title: CDISC Library API
  description: Public API for CDISC Library
  version: '1.0'
servers:
  - url: https://api.library.cdisc.org/api
paths:
  /__duckdeploy/health:
    get:
      tags:
        - System
      summary: Proxy Health Check
      description: Internal proxy health check endpoint
      operationId: getProxyHealth
      x-internal: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                type: object
