name: Unified CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  contract-validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      SCHEMATHESIS_BASE_URL: https://api.library.cdisc.org
      SCHEMATHESIS_MAX_EXAMPLES: "100"
      CDISC_PRIMARY_KEY: "dummy"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            openapi.yaml
            
      - uses: actions/setup-python@v5
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          python-version: "3.12"
          
      - uses: actions/setup-node@v4
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python3 -m pip install --upgrade pip schemathesis==4.18.0
          npm ci
          
      - name: Run Contract Validation
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npm run test:fuzz
        
      - name: Archive Diagnostic Report
        if: failure() && steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: contract-validation-report
          path: schemathesis-junit.xml

  build-and-deploy:
    name: Build, Validate, and Deploy
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          
      - run: npm ci
      
      - name: Structural Analysis
        run: npm run analyze:structure
        
      - name: Confirm Accessibility Linting Compliance
        run: npm run lint
        
      - name: Build and Test
        run: npm run build
        
      - name: Archive Frontend Contract Diagnostic Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-contract-report
          path: contract-validation-report.json
          
      - uses: actions/configure-pages@v4
        if: github.event_name != 'pull_request'
        
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: './dist'
          
  deploy:
    name: Deploy to GitHub Pages
    needs: build-and-deploy
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
